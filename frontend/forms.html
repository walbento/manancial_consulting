<!DOCTYPE html>
<html lang="pt-PT">
<head><meta charset="UTF-8"><title>Forms</title><link rel="stylesheet" href="/css/variables.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<!-- Hidden form for Netlify form detection at build time -->
<form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input name="bot-field" />
  <input type="text" name="nome" />
  <input type="email" name="email" />
  <input type="text" name="assunto" />
  <textarea name="mensagem"></textarea>
  <input type="checkbox" name="aceite-termos" />
</form>
<script src="/js/api.js" defer></script>
<script src="/js/includes.js" defer></script>
<script src="/js/menu.js" defer></script>
<script src="/js/search.js" defer></script>
<script src="/js/forms.js" defer></script>
<script src="/js/main.js" defer></script>
<script src="/js/static-fixes.js" defer></script>
</body>
</html>
