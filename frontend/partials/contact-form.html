<form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/obrigado/" class="wpcf7-form">
  <input type="hidden" name="form-name" value="contact">
  <p class="hidden"><label>Não preencher: <input name="bot-field"></label></p>
  <div class="row">
    <input type="text" name="nome" placeholder="o seu nome" required maxlength="400">
  </div>
  <div class="row">
    <input type="email" name="email" placeholder="o seu email" required maxlength="400">
  </div>
  <div class="row">
    <input type="tel" name="telefone" placeholder="telefone" maxlength="20">
  </div>
  <div class="row">
    <input type="text" name="empresa" placeholder="empresa (opcional)" maxlength="150">
  </div>
  <div class="row">
    <input type="text" name="cargo" placeholder="cargo (opcional)" maxlength="100">
  </div>
  <div class="row">
    <select name="tipo_empresa">
      <option value="">tipo de empresa (opcional)</option>
      <option value="LDA">Lda.</option>
      <option value="SA">S.A.</option>
      <option value="SU">Unipessoal (S.U.)</option>
    </select>
  </div>
  <div class="row">
    <input type="text" name="assunto" placeholder="assunto" required maxlength="400">
  </div>
  <div class="row">
    <textarea name="mensagem" placeholder="mensagem" rows="6" maxlength="2000"></textarea>
  </div>
  <div class="row">
    <label><input type="checkbox" name="aceite-termos" value="sim" required> Aceito os Termos &amp; Condições e Política de Privacidade</label>
  </div>
  <div class="row">
    <input type="submit" value="Enviar">
  </div>
</form>
